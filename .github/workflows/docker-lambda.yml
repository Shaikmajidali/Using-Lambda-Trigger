name: Build Docker Image and Trigger Lambda

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v4


    # Step 2: Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: shaikmajidali
        password: ${{ secrets.DOCKER_PASSWORD }}


    # Step 3: Build Docker Image
    - name: Build Docker image
      run: |
        docker build -t shaikmajidali/my-app:latest .


    # Step 4: Push Docker Image
    - name: Push Docker image
      run: |
        docker push shaikmajidali/my-app:latest


    # Step 5: Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1


    # Step 6: Trigger Lambda function
    - name: Trigger AWS Lambda
      run: |
        aws lambda invoke \
          --function-name myLambdaFunction \
          --payload '{"message":"New Docker Image Created"}' \
          response.json


    # Step 7: Show Lambda response
    - name: Show response
      run: cat response.json
