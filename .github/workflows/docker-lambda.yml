name: Build Docker Image and Trigger Lambda

on:
  push:
    branches:
      - main

jobs:
  build-push-lambda:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 3: Build Docker image
    - name: Build Docker image
      run: |
        docker build -t shaikmajidali/my-app:latest .

    # Step 4: Push Docker image to Docker Hub
    - name: Push Docker image
      run: |
        docker push shaikmajidali/my-app:latest

    # Step 5: Trigger Lambda function
    - name: Invoke AWS Lambda
      uses: aws-actions/aws-cli-action@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-east-1
        role-to-assume: ""
        command: |
          aws lambda invoke \
            --function-name Docker-Lambda \
            --payload '{"detail": {"Using-Lambda-Trigger": "shaikmajidali/my-app", "image-tags": ["latest"], "image-digest": ""}}' \
            response.json
          
    # Optional: Show Lambda response
    - name: Show Lambda response
      run: cat response.json
