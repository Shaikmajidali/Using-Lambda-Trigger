name: Build Docker Image and Trigger Lambda

on:
  push:
    branches:
      - main
jobs:
  build-and-trigger:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout source code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: shaikmajidali
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 3: Build Docker Image
    - name: Build Docker image
      run: docker build -t shaikmajidali/my-app:latest .

    # Step 4: Push Docker Image
    - name: Push Docker image
      run: docker push shaikmajidali/my-app:latest

    # Step 5: Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-south-1

    # Step 6: Create JSON payload file
    - name: Create payload file
      run: echo '{"message":"New Docker Image Created"}' > payload.json

    # Step 7: (Optional) List Lambda functions to debug
    - name: List Lambda functions
      run: aws lambda list-functions

    # Step 9: Show Lambda response
    - name: Show response
      run: cat response.json
