# Step 6: Create payload file
- name: Create payload
  run: echo '{"message":"New Docker Image Created"}' > payload.json

# Step 7: Trigger Lambda function
- name: Trigger AWS Lambda
  run: |
    aws lambda invoke \
      --function-name myLambdaFunction \
      --payload file://payload.json \
      response.json

# Step 8: Show Lambda response
- name: Show response
  run: cat response.json
