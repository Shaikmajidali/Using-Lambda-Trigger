name: Build Docker Image and Trigger Lambda

on:
  push:
    branches:
      - main

jobs:
  build-and-trigger:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v4


    # Step 2: Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: shaikmajidali
        password: ${{ secrets.DOCKER_PASSWORD }}


    # Step 3: Build Docker Image
    - name: Build Docker image
      run: docker build -t shaikmajidali/my-app:latest .


    # Step 4: Push Docker Image
    - name: Push Docker image
      run: docker push shaikmajidali/my-app:latest


    # Step 5: Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1


    # Step 6: Create JSON payload file
    - name: Create payload file
      run: echo '{"message":"New Docker Image Created"}' > payload.json


    # Step 7: Trigger AWS Lambda function
    - name: Invoke Lambda
      run: |
        aws lambda invoke \
          --function-name Docker-Lambda \
          --cli-binary-format raw-in-base64-out \
          --payload file://payload.json \
          response.json


    # Step 8: Show Lambda response
    - name: Show response
      run: cat response.json
