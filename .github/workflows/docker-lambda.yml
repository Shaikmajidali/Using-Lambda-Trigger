name: Build Docker Image and Trigger Lambda

on:
  push:
    branches:
      - main

jobs:
  build-push-lambda:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t shaikmajidali/my-app:latest .

      # Step 4: Push Docker image
      - name: Push Docker image
        run: |
          docker push shaikmajidali/my-app:latest

      # Step 5: Ensure AWS CLI v2 is installed
      - name: Install AWS CLI v2
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install
          aws --version

      # Step 6: Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      # Step 7: Invoke Lambda
      - name: Invoke Lambda
        run: |
          aws lambda invoke \
            --function-name Docker-Lambda \
            --payload '{"detail": {"Using-Lambda-Trigger": "shaikmajidali/my-app", "image-tags": ["latest"], "image-digest": ""}}' \
            response.json

      # Step 8: Show Lambda response
      - name: Show Lambda response
        run: cat response.json
